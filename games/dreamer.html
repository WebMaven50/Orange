<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Dreamer's Path — The Orange Robot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --orange:#E8722C;--orange-dk:#BD551A;--blue:#2B6CA3;--blue-dk:#1C4A73;
      --brass:#CBA24C;--brass-dk:#8F7128;
      --paper:#F1E9D8;--paper-2:#E6D9BF;--ink:#2A2118;--ink-soft:#6A5C46;
      --green:#54F092;--green-dim:#1f8a4d;
      --navy:#10203A;--gold:#ECB53F;
      --serif:'Fraunces',Georgia,'Times New Roman',serif;
      --mono:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;
      --sans:'Space Grotesk',system-ui,-apple-system,Segoe UI,sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%}
    body{background:radial-gradient(120% 120% at 50% 0%,#20283a 0%,#161a22 55%,#0e1016 100%);
      color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
    .topbar{display:flex;justify-content:space-between;align-items:center;
      padding:10px 20px;border-bottom:1px solid #ffffff11}
    .topbar a{font-family:var(--mono);font-size:11px;letter-spacing:.15em;
      text-transform:uppercase;color:#7b8190;text-decoration:none}
    .topbar a:hover{color:var(--gold)}
    .sats-pill{font-family:var(--mono);font-size:11px;letter-spacing:.1em;
      color:var(--gold);background:#1a1f2a;border:1px solid #2c3242;
      padding:4px 10px;border-radius:999px}
    .stage{display:flex;align-items:center;justify-content:center;
      min-height:calc(100vh - 48px);padding:16px}
    .card{width:min(620px,98vw);background:var(--paper);border-radius:14px;
      padding:clamp(20px,4vw,36px) clamp(18px,5vw,40px);
      box-shadow:0 14px 40px rgba(0,0,0,.5),inset 0 1px 0 #fff8;
      border:1px solid #d8c9a8;position:relative;
      background-image:radial-gradient(rgba(120,90,40,.05) 1px,transparent 1px);
      background-size:5px 5px}
    .eyebrow{font-family:var(--mono);font-size:clamp(9px,2.4vw,11px);letter-spacing:.18em;
      text-transform:uppercase;color:var(--orange-dk);margin:0 0 8px;display:flex;justify-content:space-between;align-items:center}
    .progress-dots{display:flex;gap:5px}
    .dot{width:6px;height:6px;border-radius:50%;background:#d8c9a8}
    .dot.filled{background:var(--orange-dk)}
    h2{font-family:var(--serif);font-weight:600;letter-spacing:-.01em;margin:0 0 14px;
      font-size:clamp(19px,5vw,28px);line-height:1.15}
    p.story{font-family:var(--serif);font-size:clamp(14.5px,3.6vw,17px);line-height:1.65;
      color:var(--ink);margin:0 0 22px}
    p.story + p.story{margin-top:-12px}
    .choices{display:flex;flex-direction:column;gap:10px}
    .choice-btn{font-family:var(--sans);font-weight:500;font-size:clamp(13.5px,3.4vw,15px);
      text-align:left;cursor:pointer;border:1px solid #c9b791;border-radius:10px;
      padding:13px 16px;color:var(--ink);background:#fffdf8;
      transition:border-color .15s,background .15s,transform .06s}
    .choice-btn:hover{border-color:var(--orange-dk);background:#fff6ea}
    .choice-btn:active{transform:translateY(1px)}
    .end-title{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
      color:var(--brass-dk);margin:0 0 6px}
    .btn{font-family:var(--sans);font-weight:600;font-size:clamp(13px,3.8vw,15px);
      cursor:pointer;border:none;border-radius:10px;
      padding:clamp(10px,2.5vw,13px) clamp(14px,4vw,20px);color:#fff;
      background:linear-gradient(180deg,var(--orange),var(--orange-dk));
      box-shadow:0 5px 0 #8c3f12,0 8px 14px rgba(0,0,0,.28);
      transition:transform .06s,box-shadow .06s;margin-top:6px}
    .btn:active{transform:translateY(4px);box-shadow:0 1px 0 #8c3f12}
    .sats-toast{font-family:var(--mono);font-size:12px;color:var(--gold);
      background:#1a1f2a;border:1px solid #2c3242;border-radius:999px;
      padding:4px 10px;display:inline-block;margin-bottom:14px}
  </style>
</head>
<body>
<div class="topbar">
  <a href="index.html">← The Vault</a>
  <span class="sats-pill" id="hub-sats">0 ⚡</span>
</div>
<div class="stage">
  <div class="card" id="card">
    <!-- populated by JS -->
  </div>
</div>
<script src="wallet.js"></script>
<script>
document.getElementById('hub-sats').textContent = TOR.fmt(TOR.getSats()) + ' ⚡';

var SCENES = [
  {
    eyebrow: 'Junior year · The Garage',
    title: 'The Blueprints',
    story: [
      "The garage smelled like sawdust and gasoline. Joey had the folding table covered in graph paper — elevations, a staircase he'd redrawn four times until the numbers finally worked. The orange robot sat on the shelf where it always sat, key wound halfway, watching like it approved.",
      "Footsteps on the gravel outside. Curtis's voice, closer than he expected. \u201cWhat is all this?\u201d"
    ],
    choices: [
      { label: 'Show him the drawings.', tag: 'open' },
      { label: 'Slide the papers under a folder before he gets a good look.', tag: 'guarded' }
    ]
  },
  {
    eyebrow: 'That evening · The Kitchen Table',
    title: 'Dinner',
    story: [
      "Frank noticed the sawdust on his hands before anyone said a word. \u201cYou build something today?\u201d he asked, passing the potatoes like it was nothing. Every fork at the table slowed down half a beat, waiting to see if it was something."
    ],
    choices: [
      { label: 'Tell the whole table what you\u2019re actually planning.', tag: 'open' },
      { label: 'Say it\u2019s nothing. Just doodles.', tag: 'guarded' }
    ]
  },
  {
    eyebrow: 'Later · The Living Room',
    title: 'The Jab',
    story: [
      "Dale caught him on the way to his room. \u201cStill winding up that toy robot, Joey?\u201d Kevin laughed from the couch without looking up from the TV. \u201cCute.\u201d"
    ],
    choices: [
      { label: 'Tell him it\u2019s none of his business. Flat, no room to push.', tag: 'confront' },
      { label: 'Let it roll off. Shrug and keep walking.', tag: 'guarded' },
      { label: 'Tell him why it matters \u2014 the key, Dad, all of it.', tag: 'open' }
    ]
  },
  {
    eyebrow: 'Back in the Garage · Hands Off',
    title: 'The Reach',
    story: [
      "Mike wandered in later, restless, and reached for the robot on the shelf without asking \u2014 the way he reached for most things that weren\u2019t his."
    ],
    choices: [
      { label: 'Step in and take it back. \u201cDon\u2019t.\u201d Nothing else.', tag: 'confront' },
      { label: 'Let him look. Walk him through what it is.', tag: 'open' },
      { label: 'Say nothing now \u2014 just move it out of reach later.', tag: 'guarded' }
    ]
  },
  {
    eyebrow: 'Midnight · Still at the Table',
    title: 'What He\u2019s Really Building',
    story: [
      "The house had gone quiet hours ago. Frank found him still hunched over the graph paper, one lamp on, the robot within arm\u2019s reach. He didn\u2019t ask what Joey was doing. He just sat down across from him and waited."
    ],
    choices: [
      { label: 'Tell him everything \u2014 the real shape of the dream.', tag: 'open' },
      { label: 'Say you\u2019re just messing around. Nothing serious.', tag: 'guarded' },
      { label: 'Tell him it\u2019s hard being the one nobody in this house really sees.', tag: 'confront' }
    ]
  }
];

var ENDINGS = {
  guarded: {
    title: 'The Guarded Dreamer',
    bonus: 250,
    text: [
      "Joey learned early to fold the important things under a folder, key wound halfway, kept close. He'd tell them everything eventually \u2014 on his own terms, in his own time, when the only opinion left to satisfy was his own.",
      "It would take him twenty years and a fortune he told almost no one about to prove he'd learned the lesson well."
    ]
  },
  open: {
    title: 'The Open Dreamer',
    bonus: 170,
    text: [
      "Joey learned to say the thing out loud before he was ready, and let the room do with it what it would. Not every dream survives being spoken in front of people who wish it were theirs.",
      "But some do. And the ones that survive are the ones worth having built at all."
    ]
  },
  confront: {
    title: 'The Confrontation',
    bonus: 110,
    text: [
      "Joey learned that some doors have to be kicked instead of knocked on. It cost him something with his brothers that took years to earn back \u2014 if it ever fully came back at all.",
      "But the robot stayed his. Nobody's hands on it but his own."
    ]
  }
};

var idx = 0;
var scores = { open: 0, guarded: 0, confront: 0 };
var CHOICE_SAT_REWARD = 10;

function renderProgress(container) {
  var dots = '';
  for (var i = 0; i < SCENES.length; i++) {
    dots += '<span class="dot' + (i < idx ? ' filled' : '') + '"></span>';
  }
  return dots;
}

function renderScene() {
  var s = SCENES[idx];
  var card = document.getElementById('card');
  var html = '<p class="eyebrow"><span>' + s.eyebrow + '</span><span class="progress-dots">' + renderProgress() + '</span></p>';
  html += '<h2>' + s.title + '</h2>';
  s.story.forEach(function(p){ html += '<p class="story">' + p + '</p>'; });
  html += '<div class="choices">';
  s.choices.forEach(function(c, i){
    html += '<button class="choice-btn" onclick="pick(' + i + ')">' + c.label + '</button>';
  });
  html += '</div>';
  card.innerHTML = html;
}

function pick(choiceIndex) {
  var s = SCENES[idx];
  var tag = s.choices[choiceIndex].tag;
  scores[tag]++;
  var earned = TOR.earn(CHOICE_SAT_REWARD, 'The Dreamer\u2019s Path \u2014 choice made');
  TOR.toast(CHOICE_SAT_REWARD);
  document.getElementById('hub-sats').textContent = TOR.fmt(earned) + ' \u26a1';
  idx++;
  if (idx >= SCENES.length) {
    renderEnding();
  } else {
    renderScene();
  }
}

function resolveEnding() {
  // priority tie-break: guarded > open > confront
  var order = ['guarded', 'open', 'confront'];
  var best = order[0];
  order.forEach(function(k){ if (scores[k] > scores[best]) best = k; });
  return best;
}

function renderEnding() {
  var key = resolveEnding();
  var e = ENDINGS[key];
  var earned = TOR.earn(e.bonus, 'The Dreamer\u2019s Path \u2014 ' + e.title);
  TOR.toast(e.bonus);
  TOR.markDone('dreamer');
  document.getElementById('hub-sats').textContent = TOR.fmt(earned) + ' \u26a1';

  var card = document.getElementById('card');
  var html = '<p class="end-title">Ending Reached</p>';
  html += '<h2>' + e.title + '</h2>';
  html += '<span class="sats-toast">+' + e.bonus + ' \u26a1 bonus \u00b7 ' + TOR.fmt(earned) + ' total</span>';
  e.text.forEach(function(p){ html += '<p class="story">' + p + '</p>'; });
  html += '<button class="btn" onclick="window.location.href=\'index.html\'">Back to the Vault \u2192</button>';
  card.innerHTML = html;
}

window.addEventListener('DOMContentLoaded', function(){
  document.getElementById('hub-sats').textContent = TOR.fmt(TOR.getSats()) + ' \u26a1';
  renderScene();
});
</script>
</body>
</html>
